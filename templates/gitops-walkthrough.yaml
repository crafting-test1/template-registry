# Template name = "gitops-walkthrough"
workspaces:
  - name: api
    ports:
      - name: http
        port: 8000
        protocol: HTTP/TCP
    checkouts:
      - path: src/api
        repo:
          git: https://github.com/crafting-test1/hello

endpoints:
  - name: api
    http:
      routes:
        - path_prefix: /
          backend:
            target: api
            port: http
