# Baseline template managed via GitOps. Template name = "gitops-sample".
workspaces:
  - name: app
    ports:
      - name: http
        port: 3100
        protocol: HTTP/TCP
    checkouts:
      - path: src/app
        repo:
          git: https://github.com/crafting-test1/hello

endpoints:
  - name: app
    http:
      routes:
        - path_prefix: /
          backend:
            target: app
            port: http
